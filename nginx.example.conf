# Nginx example for Infinity API (use inside server { } block)
# 404 fix: sab requests (jo file exist nahi karti) index.php ko bhejo

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ \.php$ {
    fastcgi_pass    unix:/tmp/php-cgi.sock;   # ya 127.0.0.1:9000
    fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include         fastcgi_params;
}
